<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img" aria-label="Celery Task Pipeline architecture">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style type="text/css"><![CDATA[
      .title { font: 700 20px system-ui, sans-serif; fill: #f8fafc; }
      .label { font: 600 13px system-ui, sans-serif; fill: #e2e8f0; }
      .sub { font: 12px system-ui, sans-serif; fill: #94a3b8; }
      .box { fill: #334155; stroke: #64748b; stroke-width: 1.5; }
      .api { fill: #1d4ed8; stroke: #60a5fa; }
      .queue { fill: #7c2d12; stroke: #fb923c; }
      .worker { fill: #047857; stroke: #34d399; }
      .db { fill: #581c87; stroke: #c084fc; }
      .arrow { stroke: #cbd5e1; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    ]]></style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#cbd5e1"/>
    </marker>
  </defs>

  <rect width="920" height="360" fill="url(#bg)"/>
  <text x="460" y="34" text-anchor="middle" class="title">Celery Task Pipeline - Architecture</text>

  <text x="40" y="68" class="label">Request path</text>

  <rect x="40" y="80" width="100" height="48" rx="8" class="box"/>
  <text x="90" y="102" text-anchor="middle" class="label">Client</text>
  <text x="90" y="118" text-anchor="middle" class="sub">HTTP</text>

  <rect x="170" y="72" width="130" height="64" rx="8" class="box api"/>
  <text x="235" y="100" text-anchor="middle" class="label">FastAPI</text>
  <text x="235" y="118" text-anchor="middle" class="sub">POST / GET jobs</text>

  <rect x="330" y="80" width="120" height="48" rx="8" class="box db"/>
  <text x="390" y="102" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="390" y="118" text-anchor="middle" class="sub">job records</text>

  <rect x="480" y="80" width="110" height="48" rx="8" class="box queue"/>
  <text x="535" y="102" text-anchor="middle" class="label">Redis</text>
  <text x="535" y="118" text-anchor="middle" class="sub">broker</text>

  <path d="M140 104 H170" class="arrow"/>
  <path d="M300 104 H330" class="arrow"/>
  <path d="M450 104 H480" class="arrow"/>

  <text x="40" y="178" class="label">Worker path</text>

  <rect x="480" y="190" width="110" height="48" rx="8" class="box queue"/>
  <text x="535" y="212" text-anchor="middle" class="label">Redis</text>
  <text x="535" y="228" text-anchor="middle" class="sub">task queue</text>

  <rect x="620" y="182" width="140" height="64" rx="8" class="box worker"/>
  <text x="690" y="208" text-anchor="middle" class="label">Celery Worker</text>
  <text x="690" y="226" text-anchor="middle" class="sub">process_data</text>
  <text x="690" y="240" text-anchor="middle" class="sub">send_webhook</text>

  <rect x="790" y="190" width="110" height="48" rx="8" class="box"/>
  <text x="845" y="212" text-anchor="middle" class="label">Webhook</text>
  <text x="845" y="228" text-anchor="middle" class="sub">external URL</text>

  <path d="M590 214 H620" class="arrow"/>
  <path d="M760 214 H790" class="arrow"/>

  <rect x="330" y="190" width="120" height="48" rx="8" class="box db"/>
  <text x="390" y="212" text-anchor="middle" class="label">PostgreSQL</text>
  <text x="390" y="228" text-anchor="middle" class="sub">status + result</text>

  <path d="M690 182 V160 H390 V138" class="arrow" stroke-dasharray="6 4"/>
  <path d="M690 246 V270 H390 V238" class="arrow"/>

  <path d="M235 136 V170 H390 V190" class="arrow" stroke-dasharray="6 4"/>

  <text x="460" y="320" text-anchor="middle" class="sub">API persists jobs and enqueues work; workers update PostgreSQL and call external webhooks.</text>
</svg>
